{% if diana_image %}
    <h2>DIANA Clustering Visualization</h2>
    <img src="{{ url_for('static', filename=diana_image) }}?v={{ time }}" alt="DIANA Clustering" class="img-fluid">
{% endif %}

{% if labels %}
    <h2 class="mt-5">Cluster Distribution</h2>
    <ul>
        {% for label, count in labels.items() %}
            <li><strong>Cluster {{ label }}:</strong> {{ count }} points</li>
        {% endfor %}
    </ul>
{% endif %}
